<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Antrian Online</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-800 to-gray-900 absolute inset-0 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Login Admin</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none pr-10">
                        <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-700 focus:outline-none">
                            <svg id="eye-icon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="login-error" class="hidden text-red-500 text-xs text-center">Username atau password salah!</div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard (Hidden by default) -->
    <div id="dashboard-screen" class="hidden min-h-screen flex-col">
        <!-- Navbar -->
        <nav class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center shadow-sm gap-4">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md p-1 overflow-hidden border border-gray-100">
                    <img src="logo.jpg" alt="Logo SMA 7" class="w-full h-full object-contain rounded-full">
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-800 leading-tight">Dashboard Antrian</h1>
                    <p class="text-xs text-blue-600 font-semibold tracking-wider uppercase">SMA NEGERI 7 MAKASSAR</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 flex-wrap justify-center">
                <div id="status-container" class="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                    <label for="system-status-select" class="text-xs text-gray-500 font-medium">Status Antrian:</label>
                    <select id="system-status-select" class="text-sm bg-transparent font-semibold outline-none text-gray-700 cursor-pointer">
                        <option value="auto">Auto (08:00 - 12:00, Sen-Jum)</option>
                        <option value="open">Buka Manual</option>
                        <option value="closed">Tutup Manual</option>
                    </select>
                </div>
                
                <div id="limit-container" class="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                    <label for="max-queue-input" class="text-xs text-gray-500 font-medium">Batas Antrian:</label>
                    <input type="number" id="max-queue-input" class="w-16 text-sm bg-transparent font-semibold outline-none text-gray-700" placeholder="-" min="0">
                </div>

                <div id="history-container" class="hidden flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200">
                    <label for="history-date-input" class="text-xs text-gray-500 font-medium">History:</label>
                    <input type="date" id="history-date-input" class="text-sm bg-transparent font-semibold outline-none text-gray-700 cursor-pointer">
                </div>

                <span class="text-sm text-gray-500 font-medium hidden md:inline" id="current-date-display">Tanggal: -</span>
                <div class="flex gap-2">
                    <button id="istirahat-btn" class="hidden text-sm bg-orange-50 hover:bg-orange-100 text-orange-600 font-medium py-1.5 px-3 rounded-lg transition-colors border border-orange-200">Mulai Istirahat</button>
                    <button id="logout-btn" class="text-sm bg-red-50 hover:bg-red-100 text-red-600 font-medium py-1.5 px-3 rounded-lg transition-colors border border-red-200">Logout</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
            
            <h2 id="welcome-message" class="text-2xl font-bold text-gray-800 mb-6 hidden">Selamat Datang, <span class="text-blue-600 capitalize" id="welcome-user"></span></h2>

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium mb-1">Total Antrian</p>
                        <h3 class="text-3xl font-bold text-gray-800" id="stat-total">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center text-xl font-bold">#</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium mb-1">Menunggu</p>
                        <h3 class="text-3xl font-bold text-yellow-600" id="stat-menunggu">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-yellow-50 text-yellow-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium mb-1">Selesai</p>
                        <h3 class="text-3xl font-bold text-green-600" id="stat-selesai">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-green-50 text-green-500 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h2 class="font-semibold text-gray-700">Daftar Antrian Hari Ini</h2>
                    <div class="flex gap-2">
                        <button id="reset-btn" class="text-sm bg-red-50 text-red-600 hover:bg-red-100 font-medium py-1.5 px-3 rounded-lg flex items-center gap-1 transition-colors border border-red-100">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Reset Antrian
                        </button>
                        <button id="refresh-btn" class="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 font-medium py-1.5 px-3 rounded-lg flex items-center gap-1 transition-colors border border-blue-100">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            Refresh
                        </button>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider border-b border-gray-200">
                                <th class="px-6 py-3 font-medium">No. Urut</th>
                                <th class="px-6 py-3 font-medium">Nama Murid</th>
                                <th class="px-6 py-3 font-medium">Nama Ortu/Wali</th>
                                <th class="px-6 py-3 font-medium">No. WA</th>
                                <th class="px-6 py-3 font-medium">Waktu Daftar</th>
                                <th class="px-6 py-3 font-medium">Status</th>
                                <th class="px-6 py-3 font-medium">Admin</th>
                                <th class="px-6 py-3 font-medium text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-gray-100 text-sm">
                            <tr>
                                <td colspan="8" class="px-6 py-10 text-center text-gray-500">
                                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div>
                                    Memuat data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- App Scripts -->
    <script src="js/firebase-config.js?v=1.0.1"></script>
    <script src="js/admin.js?v=1.0.1"></script>
</body>
</html>
