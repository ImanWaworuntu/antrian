<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Antrian - SMA Negeri 7 Makassar</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-900 text-white h-screen w-screen overflow-hidden flex flex-col">

    <!-- Audio Unlock Overlay -->
    <div id="audio-unlock-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex flex-col items-center justify-center cursor-pointer transition-opacity duration-300">
        <div class="bg-blue-600 text-white rounded-full p-6 shadow-[0_0_30px_rgba(37,99,235,0.5)] mb-6 animate-pulse">
            <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
        </div>
        <h2 class="text-4xl font-bold text-white tracking-wide mb-3 text-center">KLIK UNTUK AKTIFKAN SUARA</h2>
        <p class="text-xl text-slate-300 font-medium text-center">Suara panggilan tidak akan terdengar sebelum Anda mengklik layar ini.</p>
    </div>

    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 px-8 sm:px-12 py-6 sm:py-8 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-4">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg p-1 overflow-hidden">
                <img src="logo.jpg" alt="Logo SMA 7" class="w-full h-full object-contain rounded-full">
            </div>
            <div>
                <h1 class="text-3xl font-bold tracking-wide">ANTRIAN ONLINE</h1>
                <p class="text-lg text-blue-400 font-semibold uppercase tracking-widest">SMA Negeri 7 Makassar</p>
            </div>
        </div>
        <div class="text-right flex items-center gap-4">
            <button id="fullscreen-btn" class="bg-slate-700 hover:bg-slate-600 p-2 rounded-lg text-slate-300 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
            <div>
                <div id="clock-time" class="text-5xl font-bold tracking-tight">00:00:00</div>
                <div id="clock-date" class="text-lg text-slate-400 mt-1">Tanggal, Bulan Tahun</div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex p-6 sm:p-10 gap-6 sm:gap-8 overflow-hidden">
        
        <!-- Counters Grid (Left Side) -->
        <div class="w-3/4 flex flex-col h-full">
            <div class="flex flex-col gap-4 sm:gap-6 h-full" id="counters-container">
                <!-- Counters injected here -->
            </div>
        </div>

        <!-- Right Sidebar (Waiting List) -->
        <div class="w-1/4 flex flex-col h-full">
            
            <div class="glass-panel rounded-3xl p-6 flex-1 flex flex-col">
                <h3 class="text-lg xl:text-xl font-semibold text-slate-300 uppercase tracking-wider mb-4 border-b border-slate-700 pb-3 flex flex-col 2xl:flex-row 2xl:justify-between 2xl:items-center gap-2">
                    <span>Selanjutnya</span>
                    <span class="text-yellow-500 text-xs xl:text-sm bg-yellow-500/10 px-3 py-1 rounded-full whitespace-nowrap w-fit" id="waiting-count">0 Menunggu</span>
                </h3>
                
                <div id="waiting-list" class="flex-1 overflow-hidden flex flex-col gap-4">
                    <!-- Waiting items injected here -->
                    <div class="text-center text-slate-500 py-10">Belum ada antrian.</div>
                </div>
            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-800/50 py-3 text-center border-t border-slate-700/50 text-slate-500 text-sm">
        Sistem Antrian &copy; <span id="current-year"></span> SMA Negeri 7 Makassar
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- App Scripts -->
    <script src="js/firebase-config.js?v=1.0.5"></script>
    <script src="js/monitor.js?v=1.0.5"></script>
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
